<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f0f0;
            margin: 0;
        }
        .calculadora {
            background-color: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            width: 300px;
        }
        #pantalla {
            width: 100%;
            height: 50px;
            font-size: 24px;
            text-align: right;
            margin-bottom: 15px;
            padding: 5px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        .botones {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }
        button {
            padding: 20px;
            font-size: 18px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            background-color: #e0e0e0;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #d0d0d0;
        }
        button.operador {
            background-color: #ff9500;
            color: white;
        }
        button.operador:hover {
            background-color: #e08900;
        }
        button.igual {
            background-color: #4caf50;
            color: white;
            grid-column: span 2;
        }
        button.igual:hover {
            background-color: #45a049;
        }
        button.limpiar {
            background-color: #f44336;
            color: white;
            grid-column: span 2;
        }
        button.limpiar:hover {
            background-color: #e03c31;
        }
    </style>
</head>
<body>

<div class="calculadora">
    <input type="text" id="pantalla" readonly>
    <div class="botones">
        <button class="limpiar" onclick="limpiarPantalla()">C</button>
        <button class="operador" onclick="agregarValor('/')">/</button>
        <button class="operador" onclick="agregarValor('*')">×</button>
        
        <button onclick="agregarValor('7')">7</button>
        <button onclick="agregarValor('8')">8</button>
        <button onclick="agregarValor('9')">9</button>
        <button class="operador" onclick="agregarValor('-')">-</button>
        
        <button onclick="agregarValor('4')">4</button>
        <button onclick="agregarValor('5')">5</button>
        <button onclick="agregarValor('6')">6</button>
        <button class="operador" onclick="agregarValor('+')">+</button>
        
        <button onclick="agregarValor('1')">1</button>
        <button onclick="agregarValor('2')">2</button>
        <button onclick="agregarValor('3')">3</button>
        <button class="igual" onclick="calcular()">=</button>
        
        <button onclick="agregarValor('0')" style="grid-column: span 2;">0</button>
        <button onclick="agregarValor('.')">.</button>
    </div>
</div>

<script>
    function agregarValor(valor) {
        document.getElementById('pantalla').value += valor;
    }

    function limpiarPantalla() {
        document.getElementById('pantalla').value = '';
    }

    function calcular() {
        try {
            const resultado = eval(document.getElementById('pantalla').value);
            document.getElementById('pantalla').value = resultado;
        } catch (error) {
            document.getElementById('pantalla').value = 'Error';
        }
    }
</script>

</body>
</html>
